services:
  - type: web
    name: plant-disease-recognition
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.13
      - key: PIP_NO_CACHE_DIR
        value: 1